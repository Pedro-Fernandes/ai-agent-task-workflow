name: Agent Task
description: Create a task suitable for implementation by an AI coding agent.
title: "[Agent Task]: "
labels: ["agent-ready"]
body:
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Why does this task exist?
      placeholder: Explain the background and problem.
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What should be achieved?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What should be changed?
    validations:
      required: true
  - type: textarea
    id: non_goals
    attributes:
      label: Non-goals
      description: What should not be changed?
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance criteria
      description: Use checkboxes for testable criteria.
      value: |
        - [ ]
        - [ ]
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: How should the result be tested or reviewed?
