name: Bug Report
description: Report a defect or regression.
title: "[Bug]: "
labels: ["bug", "needs-refinement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      value: |
        1.
        2.
        3.
  - type: textarea
    id: notes
    attributes:
      label: Additional notes
